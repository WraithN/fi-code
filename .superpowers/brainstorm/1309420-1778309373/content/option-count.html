<h2>AskForQuestion 选项结构确认</h2>
<p class="subtitle">根据你的要求：最多 4 个选项，其中 3 个是预设选项，1 个是自定义输入</p>

<div class="mockup">
  <div class="mockup-header">选择框示例</div>
  <div class="mockup-body" style="padding:16px">
    <div style="border:1px solid #4b5563;border-radius:8px;padding:16px;margin-bottom:16px">
      <h4 style="margin-top:0;margin-bottom:12px">请选择下一步操作：</h4>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px">
        <button style="padding:10px 16px;border-radius:6px;border:1px solid #3b82f6;background-color:#1e293b;color:#93c5fd;text-align:left">方案A：使用 Git Bash（推荐）</button>
        <button style="padding:10px 16px;border-radius:6px;border:1px solid #4b5563;background-color:#111827;color:#9ca3af;text-align:left">方案B：使用 WSL2</button>
        <button style="padding:10px 16px;border-radius:6px;border:1px solid #4b5563;background-color:#111827;color:#9ca3af;text-align:left">方案C：使用 Cygwin</button>
      </div>
      <div style="border-top:1px solid #374151;padding-top:12px">
        <label style="display:block;margin-bottom:6px;color:#9ca3af">自定义答案：</label>
        <input type="text" placeholder="在此输入你的答案..." style="width:100%;padding:10px 12px;border-radius:6px;border:1px solid #4b5563;background-color:#111827;color:#e5e7eb">
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px">
      <button style="padding:8px 16px;border-radius:6px;border:1px solid #4b5563;background-color:#111827;color:#9ca3af">取消</button>
      <button style="padding:8px 16px;border-radius:6px;border:none;background-color:#3b82f6;color:white">确认</button>
    </div>
  </div>
</div>
