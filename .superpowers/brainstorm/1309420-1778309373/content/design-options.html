<h2>AskForQuestion 工具选择框设计</h2>
<p class="subtitle">你希望选择框在 TUI 和桌面应用中是什么样子？</p>

<div class="options">
  <div class="option" data-choice="modal" onclick="toggleSelect(this)">
    <div class="letter">A（推荐）</div>
    <div class="content">
      <h3>模态对话框</h3>
      <p>弹出居中对话框，带选项列表和自定义输入框</p>
    </div>
  </div>
  <div class="option" data-choice="drawer" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>侧边抽屉</h3>
      <p>从右侧滑出抽屉面板显示选项</p>
    </div>
  </div>
  <div class="option" data-choice="inline" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>内嵌组件</h3>
      <p>在聊天界面直接嵌入选择组件</p>
    </div>
  </div>
</div>
