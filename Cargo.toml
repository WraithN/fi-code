[package]
name = "learn-claude-code"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
reqwest = { version = "0.13.2", features = ["json", "blocking", "stream"] }
html2md = "0.2.15"
regex = "1.12.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dotenvy = "0.15"
colored = "3.1.1"
rustyline = "18.0.0"
anyhow = "1.0"
async-trait = "0.1.89"
futures = "0.3"
bytes = "1"
rand = "0.8"
ulid = "1.1"
directories = "5.0"

[dev-dependencies]
wiremock = "0.6"
tempfile = "3.10"
